<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FinTrack</title>
    <link rel="icon" href="/icon.png" type="image/png">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/icon.png">

    <!-- PWA and Mobile Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinTrack">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="FinTrack">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-config" content="/browserconfig.xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/index.css">

    <script>
       // This script prevents FOUC (Flash of Unstyled Content) by applying the theme before React loads.
       const theme = localStorage.getItem('fintrackTheme');
       if (theme) {
         document.documentElement.className = theme;
       } else {
         const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
         document.documentElement.className = isDarkMode ? 'theme-dark-slate' : 'theme-light';
       }
    </script>

    <style>
      /* Initial loader — uses theme CSS variables so it always matches the user's chosen theme */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(var(--color-bg-rgb));
        z-index: 9999;
      }
      .loader-ring {
        position: absolute;
        width: 6rem;
        height: 6rem;
        border-radius: 9999px;
        background-color: rgba(var(--color-primary-rgb), 0.2);
        animation: loader-ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      .loader-icon {
        position: relative;
        width: 4rem;
        height: 4rem;
        color: rgb(var(--color-primary-rgb));
        animation: loader-pulse 2s ease-in-out infinite;
      }
      @keyframes loader-ping {
        75%, 100% { transform: scale(2); opacity: 0; }
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>

    <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "recharts": "https://aistudiocdn.com/recharts@^2.12.7",
    "@google/genai": "https://aistudiocdn.com/@google/genai-sdk@^0.20.0"
  }
}
</script>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div style="position:relative;display:flex;align-items:center;justify-content:center;">
          <div class="loader-ring"></div>
          <svg class="loader-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941" />
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
